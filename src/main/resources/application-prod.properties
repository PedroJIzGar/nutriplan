spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_ISSUER_URI}

app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

logging.level.org.springframework.security=WARN

spring.ai.azure.openai.api-key=${AZURE_OPENAI_API_KEY}
spring.ai.azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT}
spring.ai.azure.openai.chat.options.deployment-name=${AZURE_OPENAI_DEPLOYMENT_NAME}